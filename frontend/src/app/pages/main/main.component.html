<mat-sidenav-container class="h-full">
  <mat-sidenav
    #drawer
    class="app-sidebar border-none shadow-xl"
    fixedInViewport
    [attr.role]="isHandset() ? 'dialog' : 'navigation'"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="uiService.sidenavOpened()"
    (closedStart)="uiService.setSidenav(false)"
  >
    <div class="sidebar-header">
      <mat-icon class="sidebar-logo">home_work</mat-icon>
      <div class="text-xl font-bold tracking-wider">HOMELAB</div>
      <div class="text-[10px] opacity-70 mt-1 uppercase tracking-widest">Management System</div>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list class="py-0">
      @for (item of menuItems; track item.label) {
        <a
          mat-list-item
          [routerLink]="item.link"
          routerLinkActive="nav-item-active"
          (click)="isHandset() && uiService.setSidenav(false)"
        >
          <mat-icon matListItemIcon class="!mr-4">{{ item.icon }}</mat-icon>
          <span matListItemTitle class="text-sm">{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidebar-footer">Connected via ServiceAccount</div>
  </mat-sidenav>

  <mat-sidenav-content class="bg-surface h-full overflow-y-auto scroll-smooth">
    <!-- Global Header: Sticky with lower z-index -->
    <header class="sticky top-0 z-20 bg-surface shrink-0 px-6 py-4 flex items-center justify-between border-b border-outline-variant/30">
      <div class="flex items-center gap-2">
        @if (isHandset()) {
          <button mat-icon-button (click)="uiService.toggleSidenav()" class="mr-2">
            <mat-icon>menu</mat-icon>
          </button>
        }
        <h1 class="text-2xl font-medium text-on-surface m-0 tracking-tight">{{ currentPageLabel() }}</h1>
      </div>
      
      <div class="flex items-center gap-2">
        <button
          mat-icon-button
          (click)="logout()"
          class="text-outline hover:text-error transition-colors"
          matTooltip="退出登录"
        >
          <mat-icon class="!w-5 !h-5 !text-[20px] !flex !items-center !justify-center">logout</mat-icon>
        </button>
      </div>
    </header>

    <main class="w-full animate-in fade-in duration-500">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
