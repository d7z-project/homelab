<div class="flex h-screen w-screen overflow-hidden bg-white">
  <div class="flex-2 relative hidden md:flex flex-col items-center justify-center bg-linear-to-br from-primary to-indigo-800">
    <!-- 左侧品牌展示区域 -->
    <div class="text-white text-center p-10">
      <mat-icon class="text-[100px]! w-25! h-25! mb-4 opacity-90">lan</mat-icon>
      <h1 class="text-4xl font-bold mb-2 tracking-tight">Homelab</h1>
      <p class="text-lg opacity-80 font-light">您的个人家庭实验室管理中心</p>
    </div>
    <div class="absolute bottom-10 text-white/30 text-xs">
      &copy; 2026 Homelab Project
    </div>
  </div>
  <div class="flex-1 flex justify-center items-center bg-white min-w-full md:min-w-100">
    <!-- 右侧登录表单区域 -->
    <div class="w-full max-w-90 px-6">
      <div class="mb-10">
        <h2 class="text-2xl font-bold text-gray-800">登录</h2>
        <p class="text-gray-400 text-sm mt-1">请输入您的凭据以访问系统</p>
      </div>

      <form [formGroup]="validateForm" (ngSubmit)="submitForm()" class="space-y-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>密码</mat-label>
          <mat-icon matPrefix class="text-gray-400">lock</mat-icon>
          <input matInput type="password" formControlName="password" placeholder="请输入密码" />
            @if (validateForm.get('password')?.hasError('required')) {
                <mat-error>
                    密码是必填项
                </mat-error>
            }
        </mat-form-field>
        
        @if (showTotp) {
          <mat-form-field appearance="outline" class="w-full">
             <mat-label>TOTP 验证码</mat-label>
             <mat-icon matPrefix class="text-gray-400">security</mat-icon>
             <input matInput type="text" formControlName="totp" maxlength="6" minlength="6" placeholder="6 位验证码" />
              @if (validateForm.get('totp')?.hasError('required')) {
                  <mat-error>
                      验证码是必填项
                  </mat-error>
              }
          </mat-form-field>
        }

        <div class="pt-2">
          <button mat-flat-button color="primary" class="w-full h-11! rounded-md!" [disabled]="loading">
              @if (loading) {
                  <span>验证中...</span>
              } @else {
                  <span>登录</span>
              }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
