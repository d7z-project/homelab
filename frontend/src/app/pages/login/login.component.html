<div class="login-wrapper">
  <div class="login-left">
    <!-- 左侧 2/3 纯色区域 -->
    <div class="background-image"></div>
  </div>
  <div class="login-right">
    <!-- 右侧 1/3 登录表单区域 -->
    <div class="login-form-container">
      <nz-card nzTitle="登录" [nzBordered]="false">
        <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
          <nz-form-item>
            <nz-form-control nzErrorTip="请输入密码!">
              <nz-input-group nzPrefixIcon="lock">
                <input type="password" nz-input formControlName="password" placeholder="密码" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
            @if (showTotp) {
                <nz-form-item>
                    <nz-form-control nzErrorTip="请输入验证码!">
                        <nz-input-group nzPrefixIcon="safety">
                            <input type="text" nz-input formControlName="totp" maxlength="6" minlength="6" placeholder="TOTP 验证码" />
                        </nz-input-group>
                    </nz-form-control>
                </nz-form-item>
            }
          <button nz-button nzType="primary" nzBlock [nzLoading]="loading">登录</button>
        </form>
      </nz-card>
    </div>
  </div>
</div>
