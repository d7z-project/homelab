components:
  schemas:
    common.PaginatedResponse:
      properties:
        items:
          type: object
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      type: object
    controllers.AuthInfo:
      example:
        id: id
        sessionId: sessionId
        type: type
      properties:
        id:
          type: string
        sessionId:
          type: string
        type:
          type: string
      type: object
    models.AuditCleanupResponse:
      example:
        deleted: 0
      properties:
        deleted:
          type: integer
      type: object
    models.AuditLog:
      example:
        targetId: targetId
        resource: resource
        subject: subject
        ipAddress: ipAddress
        action: action
        userAgent: userAgent
        id: id
        message: message
        status: status
        timestamp: timestamp
      properties:
        action:
          description: "CREATE, UPDATE, DELETE, or HTTP Method"
          type: string
        id:
          type: string
        ipAddress:
          type: string
        message:
          description: Detailed description
          type: string
        resource:
          description: "e.g., \"DNS/Record\", \"RBAC/ServiceAccount\""
          type: string
        status:
          description: Success or Failed
          type: string
        subject:
          description: "User or SA name (e.g., \"root\" or \"sa-name\")"
          type: string
        targetId:
          description: ID or name of the resource operated on
          type: string
        timestamp:
          description: RFC3339 format
          type: string
        userAgent:
          type: string
      type: object
    models.DnsExportResponse:
      example:
        domains:
        - records:
            key:
              key: ""
          name: name
        - records:
            key:
              key: ""
          name: name
      properties:
        domains:
          items:
            $ref: "#/components/schemas/models.ExportDomain"
          type: array
      type: object
    models.Domain:
      example:
        createdAt: createdAt
        comments: comments
        name: name
        id: id
        enabled: true
        updatedAt: updatedAt
      properties:
        comments:
          description: 备注说明
          type: string
        createdAt:
          description: 创建时间
          type: string
        enabled:
          description: 是否启用
          type: boolean
        id:
          type: string
        name:
          description: "域名名称 (e.g., example.com)"
          type: string
        updatedAt:
          description: 更新时间
          type: string
      type: object
    models.ExportDomain:
      example:
        records:
          key:
            key: ""
        name: name
      properties:
        name:
          type: string
        records:
          additionalProperties:
            additionalProperties: true
            type: object
          type: object
      type: object
    models.LoginRequest:
      properties:
        password:
          type: string
        totp:
          type: string
      type: object
    models.LoginResponse:
      example:
        session_id: session_id
      properties:
        session_id:
          type: string
      type: object
    models.PolicyRule:
      example:
        resource: resource
        verbs:
        - verbs
        - verbs
      properties:
        resource:
          type: string
        verbs:
          items:
            type: string
          type: array
      type: object
    models.Record:
      example:
        comments: comments
        name: name
        id: id
        priority: 5
        type: type
        ttl: 5
        value: value
        domainId: domainId
        enabled: true
      properties:
        comments:
          description: 备注说明
          type: string
        domainId:
          description: 关联的域名 ID
          type: string
        enabled:
          description: 是否启用
          type: boolean
        id:
          type: string
        name:
          description: "记录名 (e.g., @, www, api)"
          type: string
        priority:
          description: 优先级 (仅用于 MX 和 SRV)
          type: integer
        ttl:
          description: 生存时间 (秒)
          type: integer
        type:
          description: "记录类型 (A, AAAA, CNAME, MX, TXT, NS, SRV, CAA)"
          type: string
        value:
          description: "记录值 (e.g., 192.168.1.1)"
          type: string
      type: object
