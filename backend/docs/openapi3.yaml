openapi: 3.0.1
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
servers:
- url: /api/v1
paths:
  /actions/instances:
    get:
      description: Retrieves a history of all triggered workflow instances and their
        current status.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.TaskInstance"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: List all task instances
      tags:
      - actions
  /actions/instances/cleanup:
    post:
      description: Removes task instances and logs older than the specified number
        of days.
      parameters:
      - description: Days older than which instances will be deleted
        in: query
        name: days
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/models.TaskCleanupResponse"
          description: Number of deleted instances
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: Cleanup old task instances
      tags:
      - actions
  /actions/instances/{id}:
    delete:
      description: Removes a specific task instance and its execution logs.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: success
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Instance Not Found
      security:
      - ApiKeyAuth: []
      summary: Delete a task instance
      tags:
      - actions
  /actions/instances/{id}/cancel:
    post:
      description: Attempts to terminate a running task instance gracefully by sending
        a cancellation signal.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Instance Not Found
      security:
      - ApiKeyAuth: []
      summary: Cancel a task instance
      tags:
      - actions
  /actions/instances/{id}/logs:
    get:
      description: "Returns execution logs for a specific task instance or step, supporting\
        \ line offset for real-time refresh."
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: "Step Index (0 for engine, 1+ for steps)"
        in: query
        name: stepIndex
        schema:
          type: integer
      - description: Line offset to start reading from
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.TaskLogResponse"
          description: Logs and next offset
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Instance Not Found
      security:
      - ApiKeyAuth: []
      summary: Get task instance logs
      tags:
      - actions
  /actions/manifests:
    get:
      description: Returns the specifications (inputs/outputs) for all registered
        task processors in the system.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.StepManifest"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: List all step manifests
      tags:
      - actions
  /actions/probe:
    post:
      description: Executes a specific processor in isolation within a temporary workspace.
        Useful for debugging or testing parameters.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/actions.ProbeRequest"
        description: Probe Configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Processor Output Data
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
      security:
      - ApiKeyAuth: []
      summary: Test a single processor
      tags:
      - actions
      x-codegen-request-body-name: req
  /actions/validate/regex:
    post:
      description: Checks if a regex string is syntactically correct for Go.
      parameters:
      - description: Regex to validate
        in: query
        name: regex
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: success
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Invalid Regex
        "401":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: Validate a regular expression
      tags:
      - actions
  /actions/webhooks/{token}:
    get:
      description: Asynchronously triggers a workflow using its unique security token.
        No standard authentication required.
      parameters:
      - description: Unique Webhook Token
        in: path
        name: token
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: instanceId
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Invalid Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Disabled
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Already Running
      summary: Trigger a workflow via webhook
      tags:
      - actions
    post:
      description: Asynchronously triggers a workflow using its unique security token.
        No standard authentication required.
      parameters:
      - description: Unique Webhook Token
        in: path
        name: token
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: instanceId
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Invalid Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Disabled
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Already Running
      summary: Trigger a workflow via webhook
      tags:
      - actions
  /actions/workflows:
    get:
      description: Retrieves a list of all defined workflow templates.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.Workflow"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: List all workflows
      tags:
      - actions
    post:
      description: Creates a new workflow template with the provided steps and configuration.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Workflow"
        description: Workflow Configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Workflow"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request (Validation Error)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Create a workflow
      tags:
      - actions
      x-codegen-request-body-name: workflow
  /actions/workflows/schema:
    get:
      description: "Returns the JSON schema for workflow templates, dynamically generated\
        \ based on available processors."
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: Get workflow JSON schema
      tags:
      - actions
  /actions/workflows/validate:
    post:
      description: "Checks if a workflow configuration is valid, including variable\
        \ references and 'if' expressions."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Workflow"
        description: Workflow to validate
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Validation Error
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: Validate a workflow configuration
      tags:
      - actions
      x-codegen-request-body-name: workflow
  /actions/workflows/{id}:
    delete:
      description: Deletes a workflow template and all its associated task instances
        and triggers.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
      security:
      - ApiKeyAuth: []
      summary: Delete a workflow
      tags:
      - actions
    put:
      description: Updates an existing workflow template. Performs validation on the
        new configuration.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Workflow"
        description: Updated Workflow Configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Workflow"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
      security:
      - ApiKeyAuth: []
      summary: Update a workflow
      tags:
      - actions
      x-codegen-request-body-name: workflow
  /actions/workflows/{id}/webhook/reset:
    post:
      description: Regenerates the unique token used for Webhook triggering. The old
        token will be immediately invalidated.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: New Webhook Token
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
      security:
      - ApiKeyAuth: []
      summary: Reset a workflow webhook token
      tags:
      - actions
  /actions/workflows/{workflowId}/run:
    post:
      description: Triggers the immediate execution of a workflow template. Returns
        the generated instance ID.
      parameters:
      - description: Workflow ID to execute
        in: path
        name: workflowId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.RunWorkflowRequest"
        description: Workflow Inputs
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: instanceId
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Conflict (Already Running)
      security:
      - ApiKeyAuth: []
      summary: Run a workflow manually
      tags:
      - actions
      x-codegen-request-body-name: req
  /audit/logs:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search query
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_audit_logs_get_200_response"
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
      security:
      - ApiKeyAuth: []
      summary: List audit logs
      tags:
      - audit
  /audit/logs/cleanup:
    post:
      parameters:
      - description: Logs older than these days will be deleted
        in: query
        name: days
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.AuditCleanupResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
      security:
      - ApiKeyAuth: []
      summary: Cleanup old audit logs
      tags:
      - audit
  /auth/sessions:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.Session"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
      security:
      - ApiKeyAuth: []
      summary: List all active root sessions
      tags:
      - auth
  /auth/sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Session Not Found
      security:
      - ApiKeyAuth: []
      summary: Revoke a session
      tags:
      - auth
  /discovery/codes:
    get:
      description: Returns all registered discovery codes
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: List discovery codes
      tags:
      - discovery
  /discovery/lookup:
    get:
      description: Search for items in a specific discovery code (e.g. network/dns/domains)
      parameters:
      - description: Discovery code
        in: query
        name: code
        required: true
        schema:
          type: string
      - description: Search string
        in: query
        name: search
        schema:
          type: string
      - description: Offset
        in: query
        name: offset
        schema:
          type: integer
      - description: Limit
        in: query
        name: limit
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.LookupResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Code Not Found
      security:
      - ApiKeyAuth: []
      summary: Discovery lookup
      tags:
      - discovery
  /info:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/controllers.AuthInfo"
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: Get current user info
      tags:
      - auth
  /login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.LoginRequest"
        description: Login Request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.LoginResponse"
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      summary: Login to get session
      tags:
      - auth
      x-codegen-request-body-name: request
  /logout:
    post:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: Logout
      tags:
      - auth
  /network/dns/domains:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search by name
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_network_dns_domains_get_200_response"
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      summary: List all domains
      tags:
      - network/dns
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Domain"
        description: Domain
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Domain"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
      security:
      - ApiKeyAuth: []
      summary: Create a domain
      tags:
      - network/dns
      x-codegen-request-body-name: domain
  /network/dns/domains/{id}:
    delete:
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
