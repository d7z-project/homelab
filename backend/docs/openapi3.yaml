openapi: 3.0.1
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
servers:
- url: /api/v1
paths:
  /audit/logs:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search query
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_audit_logs_get_200_response"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List audit logs
      tags:
      - audit
  /audit/logs/cleanup:
    post:
      parameters:
      - description: Logs older than these days will be deleted
        in: query
        name: days
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.AuditCleanupResponse"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Cleanup old audit logs
      tags:
      - audit
  /auth/sessions:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.Session"
                type: array
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List all active root sessions
      tags:
      - auth
  /auth/sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
      security:
      - ApiKeyAuth: []
      summary: Revoke a session
      tags:
      - auth
  /dns/domains:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search by name
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_dns_domains_get_200_response"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List all domains
      tags:
      - dns
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Domain"
        description: Domain
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Domain"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Create a domain
      tags:
      - dns
      x-codegen-request-body-name: domain
  /dns/domains/{id}:
    delete:
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
      security:
      - ApiKeyAuth: []
      summary: Delete a domain
      tags:
      - dns
    put:
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Domain"
        description: Domain
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Domain"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Update a domain
      tags:
      - dns
      x-codegen-request-body-name: domain
  /dns/export:
    get:
      description: Returns all enabled DNS domains and records in a structured format.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.DnsExportResponse"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Export all DNS configurations
      tags:
      - dns
  /dns/records:
    get:
      parameters:
      - description: Filter by domain ID
        in: query
        name: domainId
        schema:
          type: string
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search by name or value
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_dns_records_get_200_response"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List all records
      tags:
      - dns
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Record"
        description: Record
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Record"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Create a record
      tags:
      - dns
      x-codegen-request-body-name: record
  /dns/records/{id}:
    delete:
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
      security:
      - ApiKeyAuth: []
      summary: Delete a record
      tags:
      - dns
    put:
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Record"
        description: Record
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Record"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Update a record
      tags:
      - dns
      x-codegen-request-body-name: record
  /info:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/controllers.AuthInfo"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Get current user info
      tags:
      - auth
  /login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.LoginRequest"
        description: Login Request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.LoginResponse"
          description: OK
      summary: Login to get session
      tags:
      - auth
      x-codegen-request-body-name: request
  /logout:
    post:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
      security:
      - ApiKeyAuth: []
      summary: Logout
      tags:
      - auth
  /orchestration/instances:
    get:
      description: Retrieves a history of all triggered workflow instances and their
        current status.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.TaskInstance"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
      summary: List all task instances
      tags:
      - orchestration
  /orchestration/instances/cleanup:
    post:
      description: Removes task instances and logs older than the specified number
        of days.
      parameters:
      - description: Days older than which instances will be deleted
        in: query
        name: days
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            '*/*':
              schema:
                additionalProperties: true
                type: object
          description: Number of deleted instances
      security:
      - ApiKeyAuth: []
      summary: Cleanup old task instances
      tags:
      - orchestration
  /orchestration/instances/{id}:
    delete:
      description: Removes a specific task instance and its execution logs.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: success
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Instance Not Found
      security:
      - ApiKeyAuth: []
      summary: Delete a task instance
      tags:
      - orchestration
  /orchestration/instances/{id}/cancel:
    post:
      description: Attempts to terminate a running task instance gracefully by sending
        a cancellation signal.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Instance Not Found
      security:
      - ApiKeyAuth: []
      summary: Cancel a task instance
      tags:
      - orchestration
  /orchestration/instances/{id}/logs:
    get:
      description: "Returns execution logs for a specific task instance or step, supporting\
        \ line offset for real-time refresh."
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: "Step Index (0 for engine, 1+ for steps)"
        in: query
        name: stepIndex
        schema:
          type: integer
      - description: Line offset to start reading from
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Logs and next offset
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Instance Not Found
      security:
      - ApiKeyAuth: []
      summary: Get task instance logs
      tags:
      - orchestration
  /orchestration/manifests:
    get:
      description: Returns the specifications (inputs/outputs) for all registered
        task processors in the system.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.StepManifest"
                type: array
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List all step manifests
      tags:
      - orchestration
  /orchestration/probe:
    post:
      description: Executes a specific processor in isolation within a temporary workspace.
        Useful for debugging or testing parameters.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/orchestration.ProbeRequest"
        description: Probe Configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Processor Output Data
      security:
      - ApiKeyAuth: []
      summary: Test a single processor
      tags:
      - orchestration
      x-codegen-request-body-name: req
  /orchestration/webhooks/{token}:
    get:
      description: Asynchronously triggers a workflow using its unique security token.
        No standard authentication required.
      parameters:
      - description: Unique Webhook Token
        in: path
        name: token
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: instanceId
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Invalid Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Disabled
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Already Running
      summary: Trigger a workflow via webhook
      tags:
      - orchestration
    post:
      description: Asynchronously triggers a workflow using its unique security token.
        No standard authentication required.
      parameters:
      - description: Unique Webhook Token
        in: path
        name: token
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: instanceId
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Invalid Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Disabled
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Already Running
      summary: Trigger a workflow via webhook
      tags:
      - orchestration
  /orchestration/workflows:
    get:
      description: Retrieves a list of all defined workflow templates.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/models.Workflow"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: List all workflows
      tags:
      - orchestration
    post:
      description: Creates a new workflow template with the provided steps and configuration.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Workflow"
        description: Workflow Configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Workflow"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request (Validation Error)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Create a workflow
      tags:
      - orchestration
      x-codegen-request-body-name: workflow
  /orchestration/workflows/validate:
    post:
      description: "Checks if a workflow configuration is valid, including variable\
        \ references and 'if' expressions."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Workflow"
        description: Workflow to validate
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Validation Error
      security:
      - ApiKeyAuth: []
      summary: Validate a workflow configuration
      tags:
      - orchestration
      x-codegen-request-body-name: workflow
  /orchestration/workflows/{id}:
    delete:
      description: Deletes a workflow template and all its associated task instances
        and triggers.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
      security:
      - ApiKeyAuth: []
      summary: Delete a workflow
      tags:
      - orchestration
    put:
      description: Updates an existing workflow template. Performs validation on the
        new configuration.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Workflow"
        description: Updated Workflow Configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Workflow"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
      security:
      - ApiKeyAuth: []
      summary: Update a workflow
      tags:
      - orchestration
      x-codegen-request-body-name: workflow
  /orchestration/workflows/{id}/webhook/reset:
    post:
      description: Regenerates the unique token used for Webhook triggering. The old
        token will be immediately invalidated.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: New Webhook Token
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
      security:
      - ApiKeyAuth: []
      summary: Reset a workflow webhook token
      tags:
      - orchestration
  /orchestration/workflows/{workflowId}/run:
    post:
      description: Triggers the immediate execution of a workflow template. Returns
        the generated instance ID.
      parameters:
      - description: Workflow ID to execute
        in: path
        name: workflowId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.RunWorkflowRequest"
        description: Workflow Inputs
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: instanceId
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Workflow Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/common.Response"
          description: Conflict (Already Running)
      security:
      - ApiKeyAuth: []
      summary: Run a workflow manually
      tags:
      - orchestration
      x-codegen-request-body-name: req
  /rbac/resources/suggest:
    get:
      parameters:
      - description: Prefix to filter resources
        in: query
        name: prefix
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Suggest RBAC resources
      tags:
      - rbac
  /rbac/rolebindings:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search by name or id
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_rbac_rolebindings_get_200_response"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List all role bindings
      tags:
      - rbac
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.RoleBinding"
        description: Role Binding
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.RoleBinding"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Create a role binding
      tags:
      - rbac
      x-codegen-request-body-name: rb
  /rbac/rolebindings/{id}:
    delete:
      parameters:
      - description: Role Binding ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
      security:
      - ApiKeyAuth: []
      summary: Delete a role binding
      tags:
      - rbac
    put:
      parameters:
      - description: Role Binding ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.RoleBinding"
        description: Role Binding
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.RoleBinding"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Update a role binding
      tags:
      - rbac
      x-codegen-request-body-name: rb
  /rbac/roles:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search by name or id
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_rbac_roles_get_200_response"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List all roles
      tags:
      - rbac
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Role"
        description: Role
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Role"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Create a role
      tags:
      - rbac
      x-codegen-request-body-name: role
  /rbac/roles/{id}:
    delete:
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: success
      security:
      - ApiKeyAuth: []
      summary: Delete a role
      tags:
      - rbac
    put:
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/models.Role"
        description: Role
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Role"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: Update a role
      tags:
      - rbac
      x-codegen-request-body-name: role
  /rbac/serviceaccounts:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search by name or id
        in: query
