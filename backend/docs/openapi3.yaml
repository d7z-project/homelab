  /audit/logs:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        schema:
          type: integer
      - description: Items per page
        in: query
        name: pageSize
        schema:
          type: integer
      - description: Search query
        in: query
        name: search
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_audit_logs_get_200_response"
          description: OK
      security:
      - ApiKeyAuth: []
      summary: List audit logs
      tags:
      - audit
  /audit/logs/cleanup:
