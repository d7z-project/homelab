basePath: /api/v1
definitions:
  common.PaginatedResponse:
    properties:
      items: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  controllers.AuthInfo:
    properties:
      id:
        type: string
      type:
        type: string
    type: object
  models.AuditCleanupResponse:
    properties:
      deleted:
        type: integer
    type: object
  models.AuditLog:
    properties:
      action:
        description: CREATE, UPDATE, DELETE, or HTTP Method
        type: string
      id:
        type: string
      ipAddress:
        type: string
      message:
        description: Detailed description
        type: string
      resource:
        description: e.g., "DNS/Record", "RBAC/ServiceAccount"
        type: string
      status:
        description: Success or Failed
        type: string
      subject:
        description: User or SA name (e.g., "root" or "sa-name")
        type: string
      targetId:
        description: ID or name of the resource operated on
        type: string
      timestamp:
        description: RFC3339 format
        type: string
      userAgent:
        type: string
    type: object
  models.DnsExportResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/models.ExportDomain'
        type: array
    type: object
  models.Domain:
    properties:
      comments:
        description: 备注说明
        type: string
      createdAt:
        description: 创建时间
        type: string
      enabled:
        description: 是否启用
        type: boolean
      id:
        type: string
      name:
        description: 域名名称 (e.g., example.com)
        type: string
      updatedAt:
        description: 更新时间
        type: string
    type: object
  models.ExportDomain:
    properties:
      name:
        type: string
      records:
        items:
          $ref: '#/definitions/models.ExportRecord'
        type: array
    type: object
  models.ExportRecord:
    properties:
      name:
        type: string
      priority:
        type: integer
      ttl:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  models.LoginRequest:
    properties:
      password:
        type: string
      totp:
        type: string
    type: object
  models.LoginResponse:
    properties:
      session_id:
        type: string
    type: object
  models.PolicyRule:
    properties:
      resource:
        type: string
      verbs:
        items:
          type: string
        type: array
    type: object
  models.Record:
    properties:
      comments:
        description: 备注说明
        type: string
      domainId:
        description: 关联的域名 ID
        type: string
      enabled:
        description: 是否启用
        type: boolean
      id:
        type: string
      name:
        description: 记录名 (e.g., @, www, api)
        type: string
      priority:
        description: 优先级 (仅用于 MX 和 SRV)
        type: integer
      ttl:
        description: 生存时间 (秒)
        type: integer
      type:
        description: 记录类型 (A, AAAA, CNAME, MX, TXT, NS, SRV, CAA)
        type: string
      value:
        description: 记录值 (e.g., 192.168.1.1)
        type: string
    type: object
  models.ResourcePermissions:
    properties:
      allowedAll:
        type: boolean
      allowedInstances:
        items:
          type: string
        type: array
      matchedRule:
        allOf:
        - $ref: '#/definitions/models.PolicyRule'
        description: Records which rule allowed the access
    type: object
  models.Role:
    properties:
      id:
        type: string
      name:
        type: string
      rules:
        items:
          $ref: '#/definitions/models.PolicyRule'
        type: array
    type: object
  models.RoleBinding:
    properties:
      enabled:
        type: boolean
      id:
        type: string
      name:
        type: string
      roleIds:
        items:
          type: string
        type: array
      serviceAccountId:
        type: string
    type: object
  models.ServiceAccount:
    properties:
      comments:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      lastUsedAt:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  models.SimulatePermissionsRequest:
    properties:
      resource:
        type: string
      serviceAccountId:
        type: string
      verb:
        type: string
    type: object
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
paths:
  /audit/logs:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.AuditLog'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List audit logs
      tags:
      - audit
  /audit/logs/cleanup:
    post:
      parameters:
      - description: Logs older than these days will be deleted
        in: query
        name: days
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuditCleanupResponse'
      security:
      - ApiKeyAuth: []
      summary: Cleanup old audit logs
      tags:
      - audit
  /dns/domains:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.Domain'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all DNS domains
      tags:
      - dns
    post:
      consumes:
      - application/json
      parameters:
      - description: Domain
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/models.Domain'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Domain'
      security:
      - ApiKeyAuth: []
      summary: Create a DNS domain
      tags:
      - dns
  /dns/domains/{id}:
    delete:
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a DNS domain
      tags:
      - dns
    put:
      consumes:
      - application/json
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      - description: Domain
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/models.Domain'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Domain'
      security:
      - ApiKeyAuth: []
      summary: Update a DNS domain
      tags:
      - dns
  /dns/export:
    get:
      description: Returns all domains and their associated records without internal
        IDs. Requires a valid token but no specific permissions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DnsExportResponse'
      security:
      - ApiKeyAuth: []
      summary: Export all DNS domains and records
      tags:
      - dns
  /dns/records:
    get:
      parameters:
      - description: Domain ID filter
        in: query
        name: domainId
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name or value
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.Record'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all DNS records
      tags:
      - dns
    post:
      consumes:
      - application/json
      parameters:
      - description: Record
        in: body
        name: record
        required: true
        schema:
          $ref: '#/definitions/models.Record'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Record'
      security:
      - ApiKeyAuth: []
      summary: Create a DNS record
      tags:
      - dns
  /dns/records/{id}:
    delete:
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a DNS record
      tags:
      - dns
    put:
      consumes:
      - application/json
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        type: string
      - description: Record
        in: body
        name: record
        required: true
        schema:
          $ref: '#/definitions/models.Record'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Record'
      security:
      - ApiKeyAuth: []
      summary: Update a DNS record
      tags:
      - dns
  /info:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.AuthInfo'
      security:
      - ApiKeyAuth: []
      summary: Get current user info
      tags:
      - auth
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
      summary: Login to get session
      tags:
      - auth
  /logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Logout
      tags:
      - auth
  /rbac/resources/suggest:
    get:
      parameters:
      - description: Prefix to filter resources
        in: query
        name: prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      security:
      - ApiKeyAuth: []
      summary: Suggest RBAC resources
      tags:
      - rbac
  /rbac/rolebindings:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name or id
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.RoleBinding'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all role bindings
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Role Binding
        in: body
        name: rb
        required: true
        schema:
          $ref: '#/definitions/models.RoleBinding'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RoleBinding'
      security:
      - ApiKeyAuth: []
      summary: Create a role binding
      tags:
      - rbac
  /rbac/rolebindings/{id}:
    delete:
      parameters:
      - description: Role Binding ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a role binding
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Role Binding ID
        in: path
        name: id
        required: true
        type: string
      - description: Role Binding
        in: body
        name: rb
        required: true
        schema:
          $ref: '#/definitions/models.RoleBinding'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RoleBinding'
      security:
      - ApiKeyAuth: []
      summary: Update a role binding
      tags:
      - rbac
  /rbac/roles:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name or id
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.Role'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all roles
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/models.Role'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Role'
      security:
      - ApiKeyAuth: []
      summary: Create a role
      tags:
      - rbac
  /rbac/roles/{id}:
    delete:
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a role
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      - description: Role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/models.Role'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Role'
      security:
      - ApiKeyAuth: []
      summary: Update a role
      tags:
      - rbac
  /rbac/serviceaccounts:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name or id
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.ServiceAccount'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all service accounts
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Service Account
        in: body
        name: sa
        required: true
        schema:
          $ref: '#/definitions/models.ServiceAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServiceAccount'
      security:
      - ApiKeyAuth: []
      summary: Create a service account
      tags:
      - rbac
  /rbac/serviceaccounts/{id}:
    delete:
      parameters:
      - description: Service Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a service account
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Service Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Service Account
        in: body
        name: sa
        required: true
        schema:
          $ref: '#/definitions/models.ServiceAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServiceAccount'
      security:
      - ApiKeyAuth: []
      summary: Update a service account
      tags:
      - rbac
  /rbac/serviceaccounts/{id}/reset:
    post:
      parameters:
      - description: Service Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServiceAccount'
      security:
      - ApiKeyAuth: []
      summary: Reset a service account token
      tags:
      - rbac
  /rbac/simulate:
    post:
      consumes:
      - application/json
      parameters:
      - description: Simulation Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SimulatePermissionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ResourcePermissions'
      security:
      - ApiKeyAuth: []
      summary: Simulate permissions for a service account
      tags:
      - rbac
  /rbac/verbs/suggest:
    get:
      parameters:
      - description: Resource prefix
        in: query
        name: resource
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      security:
      - ApiKeyAuth: []
      summary: Suggest RBAC verbs for a resource
      tags:
      - rbac
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
