      webhookEnabled:
        description: 是否启用 Webhook 触发
        type: boolean
      webhookToken:
        description: Webhook 触发令牌
        type: string
    type: object
  site.ExportTask:
    properties:
      createdAt:
        type: string
      error:
        type: string
      format:
        type: string
      id:
        type: string
      progress:
        type: number
      recordCount:
        type: integer
      resultUrl:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.TaskStatus'
        description: Pending, Running, Success, Failed, Cancelled
    type: object
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
paths:
  /actions/instances:
    get:
      description: Retrieves a history of all triggered workflow instances and their
        current status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.TaskInstance'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: List all task instances
      tags:
      - actions
  /actions/instances/{id}:
    delete:
      description: Removes a specific task instance and its execution logs.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Instance Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Delete a task instance
      tags:
      - actions
  /actions/instances/{id}/cancel:
    post:
      description: Attempts to terminate a running task instance gracefully by sending
        a cancellation signal.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
        "404":
          description: Instance Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Cancel a task instance
      tags:
      - actions
  /actions/instances/{id}/logs:
    get:
      description: Returns execution logs for a specific task instance or step, supporting
        line offset for real-time refresh.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        type: string
      - description: Step Index (0 for engine, 1+ for steps)
        in: query
        name: stepIndex
        type: integer
      - description: Line offset to start reading from
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Logs and next offset
          schema:
            $ref: '#/definitions/models.TaskLogResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Instance Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Get task instance logs
      tags:
      - actions
  /actions/instances/cleanup:
    post:
      description: Removes task instances and logs older than the specified number
        of days.
      parameters:
      - description: Days older than which instances will be deleted
        in: query
        name: days
        required: true
        type: integer
      responses:
        "200":
          description: Number of deleted instances
          schema:
            $ref: '#/definitions/models.TaskCleanupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Cleanup old task instances
      tags:
      - actions
  /actions/manifests:
    get:
      description: Returns the specifications (inputs/outputs) for all registered
        task processors in the system.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StepManifest'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: List all step manifests
      tags:
      - actions
  /actions/probe:
    post:
      consumes:
      - application/json
      description: Executes a specific processor in isolation within a temporary workspace.
        Useful for debugging or testing parameters.
      parameters:
      - description: Probe Configuration
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/actions.ProbeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Processor Output Data
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
