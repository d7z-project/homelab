basePath: /api/v1
definitions:
  auth.LoginRequest:
    properties:
      password:
        type: string
      totp:
        type: string
    type: object
  auth.LoginResponse:
    properties:
      session_id:
        type: string
    type: object
  auth.PolicyRule:
    properties:
      resources:
        items:
          type: string
        type: array
      verbs:
        items:
          type: string
        type: array
    type: object
  auth.Role:
    properties:
      name:
        type: string
      rules:
        items:
          $ref: '#/definitions/auth.PolicyRule'
        type: array
    type: object
  auth.RoleBinding:
    properties:
      enabled:
        type: boolean
      name:
        type: string
      roleNames:
        items:
          type: string
        type: array
      serviceAccountName:
        type: string
    type: object
  auth.ServiceAccount:
    properties:
      comments:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  common.PaginatedResponse:
    properties:
      items: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  common.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  routers.AuthInfo:
    properties:
      name:
        type: string
      type:
        type: string
    type: object
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
paths:
  /info:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routers.AuthInfo'
      summary: Get current auth info
      tags:
      - auth
  /login:
    post:
      consumes:
      - application/json
      description: verify root password and return session id
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
      summary: Login to the server
      tags:
      - auth
  /logout:
    post:
      consumes:
      - application/json
      description: invalidate session id
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Logout from the server
      tags:
      - auth
  /ping:
    get:
      consumes:
      - application/json
      description: get string "pong"
      produces:
      - application/json
      responses:
        "200":
          description: pong
          schema:
            type: string
      summary: Ping the server
      tags:
      - example
  /rbac/rolebindings:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/auth.RoleBinding'
                  type: array
              type: object
      summary: List all role bindings
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Role Binding
        in: body
        name: rb
        required: true
        schema:
          $ref: '#/definitions/auth.RoleBinding'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RoleBinding'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
      summary: Create a role binding
      tags:
      - rbac
  /rbac/rolebindings/{name}:
    delete:
      parameters:
      - description: Role Binding Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
      summary: Delete a role binding
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Role Binding Name
        in: path
        name: name
        required: true
        type: string
      - description: Role Binding
        in: body
        name: rb
        required: true
        schema:
          $ref: '#/definitions/auth.RoleBinding'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RoleBinding'
      summary: Update a role binding
      tags:
      - rbac
  /rbac/roles:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/auth.Role'
                  type: array
              type: object
      summary: List all roles
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/auth.Role'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.Role'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
      summary: Create a role
      tags:
      - rbac
  /rbac/roles/{name}:
    delete:
      parameters:
      - description: Role Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
      summary: Delete a role
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Role Name
        in: path
        name: name
        required: true
        type: string
      - description: Role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/auth.Role'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.Role'
      summary: Update a role
      tags:
      - rbac
  /rbac/serviceaccounts:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/auth.ServiceAccount'
                  type: array
              type: object
      summary: List all service accounts
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Service Account
        in: body
        name: sa
        required: true
        schema:
          $ref: '#/definitions/auth.ServiceAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.ServiceAccount'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
      summary: Create a service account
      tags:
      - rbac
  /rbac/serviceaccounts/{name}:
    delete:
      parameters:
      - description: Service Account Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
      summary: Delete a service account
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Service Account Name
        in: path
        name: name
        required: true
        type: string
      - description: Service Account
        in: body
        name: sa
        required: true
        schema:
          $ref: '#/definitions/auth.ServiceAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.ServiceAccount'
      summary: Update a service account
      tags:
      - rbac
  /rbac/serviceaccounts/{name}/reset:
    post:
      parameters:
      - description: Service Account Name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.ServiceAccount'
      summary: Reset a service account token
      tags:
      - rbac
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
