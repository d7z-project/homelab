basePath: /api/v1
definitions:
  common.PaginatedResponse:
    properties:
      items: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  common.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  controllers.AuthInfo:
    properties:
      id:
        type: string
      sessionId:
        type: string
      type:
        type: string
    type: object
  models.AuditCleanupResponse:
    properties:
      deleted:
        type: integer
    type: object
  models.AuditLog:
    properties:
      action:
        description: CREATE, UPDATE, DELETE, or HTTP Method
        type: string
      id:
        type: string
      ipAddress:
        type: string
      message:
        description: Detailed description
        type: string
      resource:
        description: e.g., "DNS/Record", "RBAC/ServiceAccount"
        type: string
      status:
        description: Success or Failed
        type: string
      subject:
        description: User or SA name (e.g., "root" or "sa-name")
        type: string
      targetId:
        description: ID or name of the resource operated on
        type: string
      timestamp:
        description: RFC3339 format
        type: string
      userAgent:
        type: string
    type: object
  models.DnsExportResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/models.ExportDomain'
        type: array
    type: object
  models.Domain:
    properties:
      comments:
        description: 备注说明
        type: string
      createdAt:
        description: 创建时间
        type: string
      enabled:
        description: 是否启用
        type: boolean
      id:
        type: string
      name:
        description: 域名名称 (e.g., example.com)
        type: string
      updatedAt:
        description: 更新时间
        type: string
    type: object
  models.ExportDomain:
    properties:
      name:
        type: string
      records:
        additionalProperties:
          additionalProperties: true
          type: object
        type: object
    type: object
  models.LogEntry:
    properties:
      message:
        type: string
      stepId:
        description: 关联的步骤 ID，空字符串代表引擎级日志
        type: string
      timestamp:
        type: string
    type: object
  models.LoginRequest:
    properties:
      password:
        type: string
      totp:
        type: string
    type: object
  models.LoginResponse:
    properties:
      session_id:
        type: string
    type: object
  models.ParamDefinition:
    properties:
      description:
        type: string
      name:
        type: string
      optional:
        description: 是否为可选参数
        type: boolean
    type: object
  models.PolicyRule:
    properties:
      resource:
        type: string
      verbs:
        items:
          type: string
        type: array
    type: object
  models.Record:
    properties:
      comments:
        description: 备注说明
        type: string
      domainId:
        description: 关联的域名 ID
        type: string
      enabled:
        description: 是否启用
        type: boolean
      id:
        type: string
      name:
        description: 记录名 (e.g., @, www, api)
        type: string
      priority:
        description: 优先级 (仅用于 MX 和 SRV)
        type: integer
      ttl:
        description: 生存时间 (秒)
        type: integer
      type:
        description: 记录类型 (A, AAAA, CNAME, MX, TXT, NS, SRV, CAA)
        type: string
      value:
        description: 记录值 (e.g., 192.168.1.1)
        type: string
    type: object
  models.ResourcePermissions:
    properties:
      allowedAll:
        type: boolean
      allowedInstances:
        items:
          type: string
        type: array
      matchedRule:
        allOf:
        - $ref: '#/definitions/models.PolicyRule'
        description: Records which rule allowed the access
    type: object
  models.Role:
    properties:
      id:
        type: string
      name:
        type: string
      rules:
        items:
          $ref: '#/definitions/models.PolicyRule'
        type: array
    type: object
  models.RoleBinding:
    properties:
      enabled:
        type: boolean
      id:
        type: string
      name:
        type: string
      roleIds:
        items:
          type: string
        type: array
      serviceAccountId:
        type: string
    type: object
  models.RunWorkflowRequest:
    properties:
      inputs:
        additionalProperties:
          type: string
        type: object
    type: object
  models.ServiceAccount:
    properties:
      comments:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      lastUsedAt:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  models.Session:
    properties:
      createdAt:
        type: string
      id:
        type: string
      ip:
        type: string
      userAgent:
        type: string
      userType:
        type: string
    type: object
  models.SimulatePermissionsRequest:
    properties:
      resource:
        type: string
      serviceAccountId:
        type: string
      verb:
        type: string
    type: object
  models.Step:
    properties:
      id:
        description: 步骤 ID，用于 ${{ steps.ID.outputs.key }}
        type: string
      if:
        description: 条件表达式 (go-expr)，为空则总是执行
        type: string
      name:
        description: 步骤显示名称
        type: string
      params:
        additionalProperties:
          type: string
        description: 输入参数，支持模板字符串
        type: object
      type:
        description: 处理器类型 (如 core/fetch/http)
        type: string
    type: object
  models.StepManifest:
    properties:
      description:
        description: 处理器功能简述
        type: string
      id:
        description: 处理器唯一标识 (如 core/fetch/http)
        type: string
      name:
        description: 显示名称
        type: string
      outputParams:
        description: 输出参数
        items:
          $ref: '#/definitions/models.ParamDefinition'
        type: array
      params:
        description: 输入参数列表 (包含必选和可选)
        items:
          $ref: '#/definitions/models.ParamDefinition'
        type: array
    type: object
  models.TaskInstance:
    properties:
      error:
        type: string
      finishedAt:
        type: string
      id:
        type: string
      inputs:
        additionalProperties:
          type: string
        description: 实际传入的变量值
        type: object
      logs:
        description: 任务日志
        items:
          $ref: '#/definitions/models.LogEntry'
        type: array
      outputs:
        additionalProperties:
          type: string
        description: 任务最终输出
        type: object
      startedAt:
        type: string
      status:
        description: Pending, Running, Success, Failed, Cancelled
        type: string
      trigger:
        description: Manual, Cron, Webhook
        type: string
      userId:
        description: 触发者 ID
        type: string
      workflowId:
        type: string
      workspace:
        type: string
    type: object
  models.VarDefinition:
    properties:
      default:
        description: 默认值 (可选变量的默认值为空)
        type: string
      description:
        description: 变量描述
        type: string
      required:
        description: 是否必填
        type: boolean
    type: object
  models.Workflow:
    properties:
      createdAt:
        type: string
      cronEnabled:
        description: 是否启用定时触发
        type: boolean
      cronExpr:
        description: Crontab 表达式
        type: string
      description:
        type: string
      enabled:
        description: 是否启用 (禁用时 Cron/Webhook/手动 均不可触发)
        type: boolean
      id:
        type: string
      name:
        type: string
      serviceAccountId:
        description: 执行该工作流时使用的身份 (必填)
        type: string
      steps:
        items:
          $ref: '#/definitions/models.Step'
        type: array
      timeout:
        description: 超时时间 (秒)，默认 7200 (2h)，0 为不超时
        type: integer
      updatedAt:
        type: string
      vars:
        additionalProperties:
          $ref: '#/definitions/models.VarDefinition'
        description: 工作流启动时接受的变量定义
        type: object
      webhookEnabled:
        description: 是否启用 Webhook 触发
        type: boolean
      webhookToken:
        description: Webhook 触发令牌
        type: string
    type: object
  orchestration.ProbeRequest:
    properties:
      params:
        additionalProperties:
          type: string
        type: object
      processorId:
        type: string
    type: object
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
paths:
  /audit/logs:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.AuditLog'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List audit logs
      tags:
      - audit
  /audit/logs/cleanup:
    post:
      parameters:
      - description: Logs older than these days will be deleted
        in: query
        name: days
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuditCleanupResponse'
      security:
      - ApiKeyAuth: []
      summary: Cleanup old audit logs
      tags:
      - audit
  /auth/sessions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Session'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List all active root sessions
      tags:
      - auth
  /auth/sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Revoke a session
      tags:
      - auth
  /dns/domains:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.Domain'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all domains
      tags:
      - dns
    post:
      consumes:
      - application/json
      parameters:
      - description: Domain
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/models.Domain'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Domain'
      security:
      - ApiKeyAuth: []
      summary: Create a domain
      tags:
      - dns
  /dns/domains/{id}:
    delete:
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a domain
      tags:
      - dns
    put:
      consumes:
      - application/json
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      - description: Domain
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/models.Domain'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Domain'
      security:
      - ApiKeyAuth: []
      summary: Update a domain
      tags:
      - dns
  /dns/export:
    get:
      description: Returns all enabled DNS domains and records in a structured format.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DnsExportResponse'
      security:
      - ApiKeyAuth: []
      summary: Export all DNS configurations
      tags:
      - dns
  /dns/records:
    get:
      parameters:
      - description: Filter by domain ID
        in: query
        name: domainId
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name or value
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.Record'
                  type: array
              type: object
      security:
      - ApiKeyAuth: []
      summary: List all records
      tags:
      - dns
    post:
      consumes:
      - application/json
      parameters:
      - description: Record
        in: body
        name: record
        required: true
        schema:
          $ref: '#/definitions/models.Record'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Record'
      security:
      - ApiKeyAuth: []
      summary: Create a record
      tags:
      - dns
  /dns/records/{id}:
    delete:
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a record
      tags:
      - dns
    put:
      consumes:
      - application/json
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        type: string
      - description: Record
        in: body
        name: record
        required: true
        schema:
          $ref: '#/definitions/models.Record'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Record'
      security:
      - ApiKeyAuth: []
      summary: Update a record
      tags:
      - dns
  /info:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.AuthInfo'
      security:
      - ApiKeyAuth: []
      summary: Get current user info
      tags:
      - auth
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
      summary: Login to get session
      tags:
      - auth
  /logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Logout
      tags:
      - auth
  /orchestration/instances:
    get:
      description: Retrieves a history of all triggered workflow instances and their
        current status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.TaskInstance'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
      summary: List all task instances
      tags:
      - orchestration
  /orchestration/instances/{id}:
    delete:
      description: Removes a specific task instance and its execution logs.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "404":
          description: Instance Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Delete a task instance
      tags:
      - orchestration
  /orchestration/instances/{id}/cancel:
    post:
      description: Attempts to terminate a running task instance gracefully by sending
        a cancellation signal.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
        "404":
          description: Instance Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Cancel a task instance
      tags:
      - orchestration
  /orchestration/instances/{id}/logs:
    get:
      description: Returns execution logs for a specific task instance or step, supporting
        line offset for real-time refresh.
      parameters:
      - description: Task Instance ID
        in: path
        name: id
        required: true
        type: string
      - description: Step Index (0 for engine, 1+ for steps)
        in: query
        name: stepIndex
        type: integer
      - description: Line offset to start reading from
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Logs and next offset
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Instance Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Get task instance logs
      tags:
      - orchestration
  /orchestration/instances/cleanup:
    post:
      description: Removes task instances and logs older than the specified number
        of days.
      parameters:
      - description: Days older than which instances will be deleted
        in: query
        name: days
        required: true
        type: integer
      responses:
        "200":
          description: Number of deleted instances
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Cleanup old task instances
      tags:
      - orchestration
  /orchestration/manifests:
    get:
      description: Returns the specifications (inputs/outputs) for all registered
        task processors in the system.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StepManifest'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List all step manifests
      tags:
      - orchestration
  /orchestration/probe:
    post:
      consumes:
      - application/json
      description: Executes a specific processor in isolation within a temporary workspace.
        Useful for debugging or testing parameters.
      parameters:
      - description: Probe Configuration
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/orchestration.ProbeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Processor Output Data
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Test a single processor
      tags:
      - orchestration
  /orchestration/webhooks/{token}:
    get:
      description: Asynchronously triggers a workflow using its unique security token.
        No standard authentication required.
      parameters:
      - description: Unique Webhook Token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: instanceId
          schema:
            type: string
        "401":
          description: Invalid Token
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: Workflow Disabled
          schema:
            $ref: '#/definitions/common.Response'
        "409":
          description: Already Running
          schema:
            $ref: '#/definitions/common.Response'
      summary: Trigger a workflow via webhook
      tags:
      - orchestration
    post:
      description: Asynchronously triggers a workflow using its unique security token.
        No standard authentication required.
      parameters:
      - description: Unique Webhook Token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: instanceId
          schema:
            type: string
        "401":
          description: Invalid Token
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: Workflow Disabled
          schema:
            $ref: '#/definitions/common.Response'
        "409":
          description: Already Running
          schema:
            $ref: '#/definitions/common.Response'
      summary: Trigger a workflow via webhook
      tags:
      - orchestration
  /orchestration/workflows:
    get:
      description: Retrieves a list of all defined workflow templates.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Workflow'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: List all workflows
      tags:
      - orchestration
    post:
      consumes:
      - application/json
      description: Creates a new workflow template with the provided steps and configuration.
      parameters:
      - description: Workflow Configuration
        in: body
        name: workflow
        required: true
        schema:
          $ref: '#/definitions/models.Workflow'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Workflow'
        "400":
          description: Bad Request (Validation Error)
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Create a workflow
      tags:
      - orchestration
  /orchestration/workflows/{id}:
    delete:
      description: Deletes a workflow template and all its associated task instances
        and triggers.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
        "404":
          description: Workflow Not Found
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Delete a workflow
      tags:
      - orchestration
    put:
      consumes:
      - application/json
      description: Updates an existing workflow template. Performs validation on the
        new configuration.
      parameters:
      - description: Workflow ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated Workflow Configuration
