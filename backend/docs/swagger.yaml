basePath: /api/v1
definitions:
  common.PaginatedResponse:
    properties:
      items: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  controllers.SimulatePermissionsRequest:
    properties:
      resource:
        type: string
      serviceAccountName:
        type: string
      verb:
        type: string
    type: object
  models.AuditLog:
    properties:
      action:
        description: CREATE, UPDATE, DELETE, or HTTP Method
        type: string
      id:
        type: string
      ipAddress:
        type: string
      resource:
        description: e.g., "DNS/Record", "RBAC/ServiceAccount"
        type: string
      status:
        description: Success or Failed
        type: string
      subject:
        description: User or SA name (e.g., "root" or "sa-name")
        type: string
      targetId:
        description: ID or name of the resource operated on
        type: string
      timestamp:
        description: RFC3339 format
        type: string
      userAgent:
        type: string
    type: object
  models.PolicyRule:
    properties:
      resources:
        items:
          type: string
        type: array
      verbs:
        items:
          type: string
        type: array
    type: object
  models.ResourcePermissions:
    properties:
      allowedAll:
        type: boolean
      allowedInstances:
        items:
          type: string
        type: array
    type: object
  models.Role:
    properties:
      name:
        type: string
      rules:
        items:
          $ref: '#/definitions/models.PolicyRule'
        type: array
    type: object
  models.RoleBinding:
    properties:
      enabled:
        type: boolean
      name:
        type: string
      roleNames:
        items:
          type: string
        type: array
      serviceAccountName:
        type: string
    type: object
  models.ServiceAccount:
    properties:
      comments:
        type: string
      lastUsedAt:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
info:
  contact: {}
  description: This is a sample server for homelab.
  title: Homelab API
  version: "1.0"
paths:
  /audit/logs:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of audit logs
      parameters:
      - description: Page number (0-based)
        in: query
        name: page
        type: integer
      - description: Number of items per page
        in: query
        name: pageSize
        type: integer
      - description: Search query by subject, action or resource
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.AuditLog'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - audit
  /rbac/rolebindings:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.RoleBinding'
                  type: array
              type: object
      summary: List all role bindings
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Role Binding
        in: body
        name: rb
        required: true
        schema:
          $ref: '#/definitions/models.RoleBinding'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RoleBinding'
      summary: Create a role binding
      tags:
      - rbac
  /rbac/rolebindings/{name}:
    delete:
      parameters:
      - description: Role Binding Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
      summary: Delete a role binding
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Role Binding Name
        in: path
        name: name
        required: true
        type: string
      - description: Role Binding
        in: body
        name: rb
        required: true
        schema:
          $ref: '#/definitions/models.RoleBinding'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RoleBinding'
      summary: Update a role binding
      tags:
      - rbac
  /rbac/roles:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.Role'
                  type: array
              type: object
      summary: List all roles
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/models.Role'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Role'
      summary: Create a role
      tags:
      - rbac
  /rbac/roles/{name}:
    delete:
      parameters:
      - description: Role Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
      summary: Delete a role
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Role Name
        in: path
        name: name
        required: true
        type: string
      - description: Role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/models.Role'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Role'
      summary: Update a role
      tags:
      - rbac
  /rbac/serviceaccounts:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: pageSize
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginatedResponse'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/models.ServiceAccount'
                  type: array
              type: object
      summary: List all service accounts
      tags:
      - rbac
    post:
      consumes:
      - application/json
      parameters:
      - description: Service Account
        in: body
        name: sa
        required: true
        schema:
          $ref: '#/definitions/models.ServiceAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServiceAccount'
      summary: Create a service account
      tags:
      - rbac
  /rbac/serviceaccounts/{name}:
    delete:
      parameters:
      - description: Service Account Name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: success
          schema:
            type: string
      summary: Delete a service account
      tags:
      - rbac
    put:
      consumes:
      - application/json
      parameters:
      - description: Service Account Name
        in: path
        name: name
        required: true
        type: string
      - description: Service Account
        in: body
        name: sa
        required: true
        schema:
          $ref: '#/definitions/models.ServiceAccount'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServiceAccount'
      summary: Update a service account
      tags:
      - rbac
  /rbac/serviceaccounts/{name}/reset:
    post:
      parameters:
      - description: Service Account Name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServiceAccount'
      summary: Reset a service account token
      tags:
      - rbac
  /rbac/simulate:
    post:
      consumes:
      - application/json
      parameters:
      - description: Simulation Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.SimulatePermissionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ResourcePermissions'
      summary: Simulate permissions for a service account
      tags:
      - rbac
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
